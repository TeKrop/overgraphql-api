name: "Build"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: ruff, ty & pytest
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.14"]
        uv-version: ["0.11.26"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          version: "${{ matrix.uv-version }}"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install the project
        run: uv sync --frozen --no-cache

      - name: Run ruff code analysis
        run: uv run ruff check .

      - name: Run ty code analysis
        run: uv run ty check .

      - name: Run tests suite
        run: |
          uv run python -m pytest -v --cov=app/ --cov-fail-under=80 --cov-report=json --cov-report=term tests/
          echo "COVERAGE=$(jq -r '.totals.percent_covered_display' coverage.json)" >> $GITHUB_ENV

      - name: Update test coverage badge
        if: github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 2962eb8ca65862892d43ce8b929d9d48
          filename: coverage.json
          label: coverage
          message: ${{ env.COVERAGE }}%
          minColorRange: 50
          maxColorRange: 90
          valColorRange: ${{ env.COVERAGE }}

      - name: Update python version badge
        if: github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 2962eb8ca65862892d43ce8b929d9d48
          filename: python-version.json
          label: python
          message: v${{ matrix.python-version }}
          color: blue

  startup-check:
    name: Docker startup check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Build and start the app, wait for healthy state
        run: docker compose up --build --detach --wait

      - name: Show logs on failure
        if: failure()
        run: docker compose logs
