[project]
name = "overgraphql-api"
version = "1.1.0"
description = "GraphQL API wrapper for OverFast API"
license = { file = "LICENSE" }
authors = [
  { name = "Valentin PORCHET", email = "valentin.porchet@proton.me" },
]
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "cachetools==7.1.*",
    "httpx2==2.5.*",
    "pydantic-settings==2.14.*",
    "strawberry-graphql[asgi]==0.320.*",
    "uvicorn==0.51.*",
]

[project.urls]
Repository = "https://github.com/TeKrop/overgraphql-api"
Issues = "https://github.com/TeKrop/overgraphql-api/issues"

[dependency-groups]
dev = [
    "pytest==9.1.*",
    "pytest-asyncio==1.4.*",
    "pytest-cov==7.1.*",
    "ruff==0.15.*",
    "ty==0.0.*",
]

[tool.uv]
compile-bytecode = true

[tool.semantic_release]
commit_parser = "conventional"
commit_message = "v{version}\n\nAutomatically generated by python-semantic-release"
tag_format = "v{version}"
version_toml = ["pyproject.toml:project.version"]

[tool.semantic_release.commit_parser_options]
parse_squash_commits = false

[tool.semantic_release.publish]
upload_to_vcs_release = false

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
src = ["app", "tests"]
target-version = "py314"

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "C90",   # mccabe complexity checker
    "I001",  # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "ASYNC", # flake8-async
    "S",     # flake8-bandit
    "BLE",   # flake8-blind-except
    "B",     # flake8-bugbear
    "A",     # flake8-builtins
    "COM",   # flake8-commas
    "C4",    # flake8-comprehensions
    "DTZ",   # flake8-datetimez
    "T10",   # flake8-debugger
    "EM",    # flake8-errmsg
    "EXE",   # flake8-executable
    "FIX",   # flake8-fixme
    "FA",    # flake8-future-annotations
    "INT",   # flake8-gettext
    "ISC",   # flake8-implicit-str-concat
    "ICN",   # flake8-import-conventions
    "LOG",   # flake8-logging
    "G",     # flake8-logging-format
    "INP",   # flake8-no-pep420
    "PIE",   # flake8-pie
    "T20",   # flake8-print
    "PYI",   # flake8-pyi
    "PT",    # flake8-pytest-style
    "Q",     # flake8-quotes
    "RSE",   # flake8-raise
    "RET",   # flake8-return
    "SLF",   # flake8-self
    "SLOT",  # flake8-slots
    "SIM",   # flake8-simplify
    "TID",   # flake8-tidy-imports
    "TCH",   # flake8-type-checking
    "ARG",   # flake8-unused-arguments
    "PTH",   # flake8-use-pathlib
    "ERA",   # eradicate commented-out code
    "PGH",   # pygrep-hooks
    "PL",    # pylint
    "TRY",   # tryceratops
    "FLY",   # flynt
    "PERF",  # perflint
    "FURB",  # refurb
    "RUF",   # ruff-specific rules
]
ignore = [
    # General rules to ignore
    "S101",    # using "assert" is not a security issue
    "RET505",  # allow using else after return statement
    "TID252",  # allow relative imports from parents

    # Rules already handled by ruff formatter
    "E501",    # line too long
    "COM812",  # missing trailing comma
    "COM819",  # prohibited trailing comma
    "ISC001",  # single line implicit string concatenation
    "Q000",    # bad quotes in inline string
    "Q001",    # bad quotes in multiline string
    "Q002",    # bad quotes in docstring
    "Q003",    # avoidable escape quote
    "W191",    # tab indentation detected instead of spaces
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["SLF001", "PLR2004", "TC001", "ARG002"]  # Private member access, magic values, runtime imports, unused args in fakes
"app/graphql/**" = ["TC001", "TC002"]  # Strawberry resolves annotations at runtime
"app/main.py" = ["ARG001", "ARG002"]  # Starlette endpoints and strawberry overrides must accept request/response

[tool.ruff.lint.isort]
known-first-party = ["app"]
